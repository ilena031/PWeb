<!DOCTYPE html>
<html>
<head>
<title>Tugas PWeb</title>

<style>
body {
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(to right, #d9e4f5, #f5f7fa);
    margin: 0;
    padding: 40px;
}

/* JUDUL */
h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* TABLE STYLE */
table {
    width: 50%;
    margin: auto;
    background-color: white;
    border: #000000;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

th, td {
    padding: 12px;
    text-align: center;
}

th {
    background-color: #4a90e2;
    color: white;
}

tr:nth-child(even) {
    background-color: #f2f2f2;
}

tr:hover {
    background-color: #dbe9ff;
}

/* LOGIN BOX */
.login-box {
    width: 300px;
    margin: 50px auto;
    padding: 15px;
    border-radius: 15px;
    background: white;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

.login-box h2 {
    text-align: center;
    margin-bottom: 20px;
}

input[type="text"],
input[type="password"] {
    width: 80%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
}

input[type="text"]:focus,
input[type="password"]:focus {
    border-color: #4a90e2;
    box-shadow: 0 0 5px rgba(74,144,226,0.5);
}

input[type="submit"] {
    width: 80%;
    padding: 10px;
    background: #4a90e2;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

input[type="submit"]:hover {
    background: #357abd;
}

label {
    font-weight: bold;
}

</style>
</head>

<body>

<!-- TABEL -->
<h2>Tugas Tabel</h2>

<table>
    <tr>
        <th rowspan="2">Nama</th>
        <th colspan="3">Nilai</th>
    </tr>
    <tr>
        <th>Kimia</th>
        <th>Fisika</th>
        <th>Biologi</th>
    </tr>
    <tr>
        <td>Robby</td>
        <td>76</td>
        <td>80</td>
        <td>81</td>
    </tr>
    <tr>
        <td>Rendi</td>
        <td>84</td>
        <td>70</td>
        <td>75</td>
    </tr>
    <tr>
        <td>Alfian</td>
        <td>96</td>
        <td>70</td>
        <td>71</td>
    </tr>
</table>
<br><br><br>

<!-- FORM -->
<h2>Tugas Form</h2>

<div class="login-box">
    <h2>Login</h2>

    <form action="/action_page.php">
        <label for="uname">Username</label>
        <input type="text" id="uname" name="uname">

        <label for="pass">Password</label>
        <input type="password" id="pass" name="pass"><br>

        <input type="checkbox" id="remember" name="remember">
        <label for="remember"> Remember Me</label>
        <br><br>

        <input type="submit" value="Login">
    </form>
</div>

</body>
</html>
